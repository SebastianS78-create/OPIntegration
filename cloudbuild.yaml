substitutions:
  _REGION: europe-central2
  _SERVICE: my-service
  _REPO: app
  _SHORT_SHA: latest

steps:
  # Step 1: Pull previous image as layer cache
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker pull ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest || true

  # Step 2: Build image with cache (faster when base unchanged)
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:${_SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - .

  # Step 3: Push to Artifact Registry (internal GCP network — fast)
  - name: gcr.io/cloud-builders/docker
    args: [push, --all-tags,
           ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}]

  # Step 4: Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:${_SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --quiet

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:${_SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

options:
  machineType: E2_HIGHCPU_8   # 8 vCPU — faster build for ML dependencies
  logging: CLOUD_LOGGING_ONLY
