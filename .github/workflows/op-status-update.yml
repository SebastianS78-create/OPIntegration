name: Update OpenProject Status

on:
  push:
    branches: ['feature/OP-*', 'task/OP-*', 'fix/OP-*']
  pull_request:
    types: [opened, closed, reopened]

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Extract OP Work Package ID
        id: extract
        run: |
          BRANCH=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          WP_ID=$(echo "$BRANCH" | grep -oP 'OP-\K[0-9]+' | head -1)
          echo "wp_id=${WP_ID}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT

      - name: Set status and comment based on event
        id: status
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "status_id=7" >> $GITHUB_OUTPUT
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
            COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
            AUTHOR="${{ github.event.head_commit.author.name }}"
            COMMENT="**Commit pushed** to branch \`${{ steps.extract.outputs.branch }}\`\n\n**Commit:** [${SHORT_SHA}](${COMMIT_URL})\n**Author:** ${AUTHOR}\n**Message:** ${COMMIT_MSG}\n\nStatus changed to **In Progress**"
            echo "comment<<EOFCOMMENT" >> $GITHUB_OUTPUT
            echo "$COMMENT" >> $GITHUB_OUTPUT
            echo "EOFCOMMENT" >> $GITHUB_OUTPUT

          elif [ "${{ github.event.action }}" = "opened" ]; then
            echo "status_id=9" >> $GITHUB_OUTPUT
            PR_URL="${{ github.event.pull_request.html_url }}"
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_NUM="${{ github.event.pull_request.number }}"
            COMMENT="**Pull Request opened**\n\n**PR:** [#${PR_NUM} — ${PR_TITLE}](${PR_URL})\n**Branch:** \`${{ steps.extract.outputs.branch }}\` -> \`main\`\n\nStatus changed to **In Testing**"
            echo "comment<<EOFCOMMENT" >> $GITHUB_OUTPUT
            echo "$COMMENT" >> $GITHUB_OUTPUT
            echo "EOFCOMMENT" >> $GITHUB_OUTPUT

          elif [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            echo "status_id=10" >> $GITHUB_OUTPUT
            PR_URL="${{ github.event.pull_request.html_url }}"
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_NUM="${{ github.event.pull_request.number }}"
            ACTOR="${{ github.actor }}"
            COMMENT="**Pull Request merged**\n\n**PR:** [#${PR_NUM} — ${PR_TITLE}](${PR_URL})\n**Merged by:** ${ACTOR}\n\nStatus changed to **Tested**"
            echo "comment<<EOFCOMMENT" >> $GITHUB_OUTPUT
            echo "$COMMENT" >> $GITHUB_OUTPUT
            echo "EOFCOMMENT" >> $GITHUB_OUTPUT

          elif [ "${{ github.event.action }}" = "closed" ]; then
            echo "status_id=14" >> $GITHUB_OUTPUT
            PR_URL="${{ github.event.pull_request.html_url }}"
            PR_NUM="${{ github.event.pull_request.number }}"
            COMMENT="**Pull Request closed** without merge\n\n**PR:** [#${PR_NUM}](${PR_URL})\n\nStatus changed to **Rejected**"
            echo "comment<<EOFCOMMENT" >> $GITHUB_OUTPUT
            echo "$COMMENT" >> $GITHUB_OUTPUT
            echo "EOFCOMMENT" >> $GITHUB_OUTPUT
          fi

      - name: Get lockVersion from OpenProject
        id: get_wp
        if: steps.extract.outputs.wp_id != ''
        run: |
          AUTH=$(echo -n "apikey:${{ secrets.OPENPROJECT_API_TOKEN }}" | base64 -w 0)
          RESPONSE=$(curl -sf \
            "${{ secrets.OPENPROJECT_URL }}/api/v3/work_packages/${{ steps.extract.outputs.wp_id }}" \
            -H "Authorization: Basic ${AUTH}")
          echo "lock_version=$(echo $RESPONSE | jq -r '.lockVersion')" >> $GITHUB_OUTPUT

      - name: Update OpenProject status
        if: steps.extract.outputs.wp_id != '' && steps.status.outputs.status_id != ''
        run: |
          AUTH=$(echo -n "apikey:${{ secrets.OPENPROJECT_API_TOKEN }}" | base64 -w 0)
          curl -sf -X PATCH \
            "${{ secrets.OPENPROJECT_URL }}/api/v3/work_packages/${{ steps.extract.outputs.wp_id }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Basic ${AUTH}" \
            -d '{
              "lockVersion": ${{ steps.get_wp.outputs.lock_version }},
              "_links": {
                "status": {
                  "href": "/api/v3/statuses/${{ steps.status.outputs.status_id }}"
                }
              }
            }'

      - name: Add comment to OpenProject
        if: steps.extract.outputs.wp_id != '' && steps.status.outputs.comment != ''
        run: |
          AUTH=$(echo -n "apikey:${{ secrets.OPENPROJECT_API_TOKEN }}" | base64 -w 0)
          COMMENT=$(echo '${{ steps.status.outputs.comment }}')
          curl -sf -X POST \
            "${{ secrets.OPENPROJECT_URL }}/api/v3/work_packages/${{ steps.extract.outputs.wp_id }}/activities" \
            -H "Content-Type: application/json" \
            -H "Authorization: Basic ${AUTH}" \
            -d "{\"comment\": {\"raw\": \"${COMMENT}\"}}"
