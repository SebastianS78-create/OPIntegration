name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - name: Run pytest
        id: pytest
        run: pytest --tb=short --json-report --json-report-file=test_report.json || true

      - name: Create Bug in OpenProject on test failure
        if: failure()
        run: |
          BRANCH=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          WP_ID=$(echo "$BRANCH" | grep -oP 'OP-\K[0-9]+' | head -1)
          FAILURES=$(cat test_report.json | jq -r '.summary.failed // 0')
          AUTH=$(echo -n "apikey:${{ secrets.OPENPROJECT_API_TOKEN }}" | base64 -w 0)

          curl -sf -X POST \
            "${{ secrets.OPENPROJECT_URL }}/api/v3/projects/${{ secrets.OPENPROJECT_PROJECT_ID }}/work_packages" \
            -H "Content-Type: application/json" \
            -H "Authorization: Basic ${AUTH}" \
            -d "{
              \"subject\": \"[BUG] Test failure in ${BRANCH} — ${FAILURES} tests failed\",
              \"description\": {\"format\": \"markdown\", \"raw\": \"## Automatyczny Bug z GitHub Actions\\n\\n**Branch:** ${BRANCH}\\n**PR:** ${{ github.event.pull_request.html_url }}\\n**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\\n\\nSzczegoly w powyzszym linku.\"},
              \"_links\": {
                \"type\": {\"href\": \"/api/v3/types/7\"},
                \"status\": {\"href\": \"/api/v3/statuses/1\"},
                \"priority\": {\"href\": \"/api/v3/priorities/9\"},
                \"parent\": {\"href\": \"/api/v3/work_packages/${WP_ID}\"}
              }
            }"
